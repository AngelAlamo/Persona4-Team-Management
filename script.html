<script type="module">

// ------------------------------------
// Modules

import readXLSXFile from 'https://cdn.jsdelivr.net/npm/read-excel-file@5.7.0/+esm';


// ------------------------------------
// Functions

function AddTextById(id, text) { document.getElementById(id).innerHTML = text; }

function ChangeColorCell(idcell, stat) {
  let cell = document.getElementById(idcell);
  
  if (stat == "none") { 
    cell.style.backgroundColor = "white";
    cell.style.color = "black";
    return;
  } else {
    cell.style.backgroundColor = map_colors[stat];
    if (stat == "Null") { cell.style.color = "white"; }
  }
}

const map_colors = {
  "―": "#F8F8FF",
  "Str": "#AEC6FF",
  "Weak": "#FFBCB3",
  "Rpl": "#FFF1A8",
  "Dr": "#DCC6F8",
  "Null": "#2B2B2B"
};
const lstats = ["―", "Str", "Weak", "Rpl", "Dr", "Null"];

// ------------------------------------
// Add rows to tables

function AddRows(name, num_cols) {
  let ttable = document.getElementById("ttable" + name);
  
  let row = document.createElement("tr");
  for (let i=0; i<num_rows; i++) 
  {
    if (name == "Str&Wk") {
      for (let j=0; j<num_cols; j++) { 
        let td = document.createElement("td");
        td.id = name + i + "," + j;
        row.appendChild(td); 
      }
    } 
    else {
      for (let j=0; j<num_cols; j++) {
        let td = document.createElement("td");
        td.id = name + i + "," + j;
        if(j == 0 || j == 1) { row.appendChild(td); }
        else { 
          let select = document.createElement("select");
          select.disabled = true;
          select.id = "select" + name + i + "," + j;
          opts_stats.forEach(value_opt => {
            let opt = document.createElement("option");
            opt.value = value_opt; opt.text = value_opt;
            select.appendChild(opt);
          });
          td.appendChild(select);
          row.appendChild(td);
        }
      }
    }
    ttable.appendChild(row);
    row = document.createElement("tr");
  }
}

var num_rows = 12;
var opts_stats = ["No", "1", "All", "1&All"];

var ltable = ["Str&Wk", "At", "Def"];
var len_ltable = ltable.length;
var len_table = [9, 10, 8];

for (let itable = 0; itable<len_ltable; itable++) { AddRows(ltable[itable], len_table[itable]); }


// ------------------------------------
// Read excel Personas stats

async function cargarDatos() {
  const res = await fetch('https://angelalamo.github.io/Persona4-Team-Management/datos_personas_stats.xlsx');
  const buffer = await res.arrayBuffer();
  const rows = await readXLSXFile(buffer);
  return rows;
}

const table_stats = await cargarDatos();


// ------------------------------------
// Add Personas to options datalist and conversion table_stats to map

const datalist_input = document.getElementById("optsPersonaSelectTable");

const map_stats = new Map();
table_stats.slice(1).forEach(fila => {
  const nombre = fila[0].replace("_", " ");
  map_stats.set(nombre, [nombre].concat(fila.slice(1)));  // Map: name_persona: stats

  // Add to datalist
  let option = document.createElement("option");
  option.value = nombre;
  datalist_input.appendChild(option);
});


// ------------------------------------
// Add Persona to tables

function ValidationPersona(name_persona) {
  const found = Array.from(datalist_input.options).some(opt => opt.value === name_persona);
  
  if (name_persona === '' || !found) { return false; }
  return true;
}

function AddPersona(name_persona) {
  if (!ValidationPersona(name_persona) || 
    list_added_personas.includes(name_persona)) { return false; };
  
  if (free_rows.length > 0) {
    new_row = free_rows[0];
    
    for (let itable=0; itable<len_ltable; itable++) {
      
      let table = ltable[itable];
      let col = 0;
      while (col < len_table[itable]) {
        
        let id = table + new_row + "," + col;
        if (table == "Str&Wk" || col == 0 || col == 1) {
          let data = map_stats.get(name_persona)[col];
          AddTextById(id, data.bold());
          ChangeColorCell(table + new_row + "," + col, data);
        } 
        else { document.getElementById("select" + id).disabled = false; }
        col += 1;
      }
    }
    list_added_personas[new_row] = name_persona;
    free_rows.shift();
    return true;
  }
}

let free_rows = Array.from({ length: 12 }, (_, i) => i);
var list_added_personas = Array(12).fill("");
var new_row = 0;
const input = document.getElementById("PersonaSelectTable");

input.addEventListener("keydown", function(event) {
  if (event.key === "Enter" && AddPersona(input.value)) { input.value = ""; }
});

const buttonAddPersona = document.getElementById("buttonAddPersonaSelectTable");

buttonAddPersona.addEventListener("click", function() {
  if (AddPersona(input.value)) { input.value = ""; } 
});


// ------------------------------------
// Remove Persona

// Binary search
function AddIdxRow(arr, value) {

  let left = 0; let right = arr.length;
  while (left < right) {
  
    let mid = Math.floor((left + right) / 2);
    if (arr[mid] < value) { left = mid + 1; } 
    else { right = mid; }
  }
  arr.splice(left, 0, value);
}


function RemovePersona(name_persona) {
  
  let idx_persona = list_added_personas.indexOf(name_persona);
  if (idx_persona == -1) { return false; }
  
  list_added_personas[idx_persona] = "";
  AddIdxRow(free_rows, idx_persona);
  
  for (let itable=0; itable<len_ltable; itable++) {
    
    let table = ltable[itable];
    let col = 0;
    while (col < len_table[itable]) {
    
      let id = table + idx_persona + "," + col;
      if (table == "Str&Wk" || col == 0 || col == 1) {
        AddTextById(id, "");
        ChangeColorCell(id, "none");
      } 
      else {
        document.getElementById("select" + id).disabled = true;
      }
      col += 1;
    }
  }
  return true;
}

const buttonRemovePersona = document.getElementById("ButtonRemovePersonaSelectTable");

buttonRemovePersona.addEventListener("click", function(){
  if (RemovePersona(input.value)) { input.value = ""; } 
});




// --------------------- Compendium ---------------------


// ------------------------------------
// Add inputs filters on html

function AddFilters(name, n) {
  let div = document.createElement("div");
  if (name == "Persona") {
  
    let inputComp = document.createElement("input");
    inputComp.setAttribute("list", "opts" + name); inputComp.class = "InputsCompendium";
    inputComp.id = "input" + name; inputComp.placeholder = name;
    let dl = document.createElement("datalist"); 
    dl.id = "opts" + name;
    inputComp.appendChild(dl); div.appendChild(inputComp);
  } else {
  
    let select = document.createElement("select");
    select.id = "select" + name; select.class = "InputsCompendium";
    div.appendChild(select);
  }
  document.getElementById("div" + n + "Compendium").appendChild(div);
}

function AddSelectOptions(select, filter) {
 
  let option = document.createElement("option");
  option.value = "stat"; option.text = filter;
  select.appendChild(option);
  
  lstats.forEach(stat => {
    option = document.createElement("option");
    option.value = stat; option.text = stat;
    select.appendChild(option);
    });
}

function AddSelectOptionsArcana(selectarc) {
  
  larcanas.forEach(arc => {
    let option = document.createElement("option");
    option.value = arc;
    if (arc != "stat") { option.text = arc; } else { option.text = "Arcana"; }
    selectarc.appendChild(option);
  });
}

var larcanas = ["stat", "Fool", "Magician", "Priestess", "Empress", "Emperor", "Hierophant", "Lovers", "Chariot", "Justice", "Hermit", "Fortune", "Strength", "Hanged Man", "Death", "Temperance", "Devil", "Tower", "Star", "Moon", "Sun", "Jester", "Aeon", "Judgment", "World"];

var ldiv1 = ["Persona", "Arcana", "Physical", "Fire", "Ice"];
var ldiv2 = ["Thunder", "Wind", "Light", "Dark"];
var lselects = [];

AddFilters("Persona", 1); AddFilters("Arcana", 1);
let selectArcana = document.getElementById("selectArcana");
lselects.push(selectArcana);
AddSelectOptionsArcana(selectArcana);

ldiv1.slice(2).forEach(stat => { 
  AddFilters(stat, 1);    // Add div with input / select
  let select = document.getElementById("select" + stat);
  lselects.push(select);    // Select saved in lselects
  AddSelectOptions(select, stat);   // Add select options
});
ldiv2.forEach(stat => { 
  AddFilters(stat, 2); 
  let select = document.getElementById("select" + stat);
  lselects.push(select);
  AddSelectOptions(select, stat);
});


// ------------------------------------
// Add options to Persona input Compendium

var datalistCompendium = document.getElementById("optsPersona");
map_stats.forEach(persona => {
  const option = document.createElement("option");
  option.value = persona[0];
  datalistCompendium.appendChild(option);
});


// ------------------------------------
// Add Persona to Compendium


function ValidationFilters(stats_persona) {
  if (!stats_persona[0].toLowerCase().includes(inputPersona.value.toLowerCase()) && inputPersona.value != "") { return false; }
  
  for (let i=1; i < stats_persona.length; i++) {
    if (stats_persona[i] != lselects[i-1].value && lselects[i-1].value != "" && lselects[i-1].value != "stat") { return false; }
  }
  
  return true;
}

var tbodyCompendium = document.getElementById("ttableCompendium");
function AddPersonaToCompendium(stats_persona) {
  if (!ValidationFilters(stats_persona)) { return false; }
  
  let text = document.createElement("tr");
  for (let j=0; j < stats_persona.length; j++) {
  
    let td = document.createElement("td");
    if (stats_persona[j] == "Null") { td.style.color = "white"; } 
    
    td.style.backgroundColor = map_colors[stats_persona[j]];
    td.innerHTML = stats_persona[j].bold();
    text.appendChild(td);
  }
  tbodyCompendium.appendChild(text);
}

function FilterCompendium() {
  tbodyCompendium.innerHTML = ""; 
  map_stats.forEach(stats_persona => AddPersonaToCompendium(stats_persona)); 
}

inputPersona.addEventListener("input", function() { FilterCompendium(); });
lselects.forEach(select => { select.addEventListener("change", function() { FilterCompendium(); }) });

FilterCompendium();


</script>
