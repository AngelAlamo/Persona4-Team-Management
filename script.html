
<script type="module">

// ------------------------------------
// Modules

import readXLSXFile from 'https://cdn.jsdelivr.net/npm/read-excel-file@5.7.0/+esm';


// ------------------------------------
// Add rows to tables

function añadirFilas(name) {
  var fila = "";
  for (let i=0; i<12; i++) {
    fila += "<tr>";
    
    if (name == "Str&Wk") {
      for (let j=0; j<9; j++) {
        fila += "<td id="+name+i+","+j+"></td>";
      }
      document.getElementById("ttable" + name).innerHTML = fila + "</tr>";
    }
    else {
      for (let j=0; j<9; j++) {
        fila += "<td id="+name+i+","+j+">";
        
        if(j == 0 || j == 1) { fila += "</td>"; }
        else { fila += "<select id=select"+name+i+","+j+" disabled><option>No</option><option>1</option><option>All</option><option>1&All</option></select></td>"; }
      }
      document.getElementById("ttable" + name).innerHTML = fila + "</tr>";
    }
  }
}

var lista_table = ["Str&Wk", "At", "Def"];

lista_table.forEach(añadirFilas);


// ------------------------------------
// Read excel Personas stats

async function cargarDatos() {
  const res = await fetch('/datos_personas_stats.xlsx');
  const buffer = await res.arrayBuffer();
  const rows = await readXLSXFile(buffer);
  return rows;
}

const table_stats = await cargarDatos();


// ------------------------------------
// Add Personas to options datalist and conversion table_stats to map

const datalist = document.getElementById("optsPersonaSelectTable");

const datos_personas_stats = new Map();
table_stats.slice(1).forEach(fila => {
  const nombre = fila[0].replace("_", " ");
  datos_personas_stats.set(nombre, fila);  // Map: name_persona: stats

  // Add to datalist
  const option = document.createElement("option");
  option.value = nombre;
  datalist.appendChild(option);
});


// ------------------------------------
// Add Persona to tables

  const encontrado = Array.from(datalist.options).some(opt => opt.value === name_persona); // Searching

    console.log("Persona does not exist"); 
    return false;  
  }
  else {
    console.log("Persona selected");
    return true;
  }
}
